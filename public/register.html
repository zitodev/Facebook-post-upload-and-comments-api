<h2>Registration Form</h2>

<form id="registerForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required placeholder="Enter your name"><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required placeholder="Enter your email"><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required placeholder="Enter your password"><br><br>

    <label for="confirmPassword">Confirm Password:</label>
    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password"><br><br>
    
    <label for="phone">Phone:</label>
    <input type="number" id="phone" name="phoneNumber" required placeholder="Enter your phone number"><br><br>

    <label for="role">Role:</label>
    <select id="role" name="role" required>
        <option value="">Select a role</option>
        <option value="seller">Seller</option>
        <option value="buyer">Buyer</option>
        <option value="admin">Admin</option>
    </select><br><br>

    <label for="image">Passport:</label>
    <input type="file" id="image" name="profileImage"  required><br><br>

    <button type="submit">Register</button>

</form>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const phoneNumber = document.getElementById('phone').value;
        const role = document.getElementById('role').value;
        const profileImage = document.getElementById('image').files[0];


        if (password !== confirmPassword) {
            alert('Passwords do not match');
            return;
        }

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, email, password, confirmPassword, phoneNumber, role, profileImage })
            });

            if (response.ok) {
                const data = await response.json();
                alert('Registration successful');
                window.location.href = 'login.html';
            } else {
                const data = await response.json();
                alert(data.message || 'Registration failed');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred during registration');
        }
    });
</script>
